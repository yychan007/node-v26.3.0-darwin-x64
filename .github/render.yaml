services:
  - type: web
    name: technical-standards-search-portal
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 -b 0.0.0.0:$PORT app:app
    envVars:
      - key: APP_ENV
        value: production
      - key: DATA_DIR
        value: /data
      - key: DATABASE_PATH
        value: /data/search_portal.db
      - key: ADMIN_AUTO_CREATE
        value: "true"
      - key: ENABLE_SEMANTIC_SEARCH
        value: "false"
      - key: ADMIN_USERNAME
        value: admin
      - key: APP_SECRET_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
    disks:
      - name: technical-standards-data
        mountPath: /data
        sizeGB: 1
